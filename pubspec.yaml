name: shredded_squad_sqlite_2
description: A fitness tracking app for logging meals, activities and personal records.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Utilities
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  http: ^1.2.1
  connectivity_plus: ^7.2.0

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Session & Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.0

  # Sensors & GPS
  sensors_plus: ^6.0.0
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/icon/icon.png"